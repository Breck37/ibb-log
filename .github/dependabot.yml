version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      expo:
        patterns:
          - 'expo'
          - 'expo-*'
          - 'jest-expo'
          - 'eslint-config-expo'
      dev-dependencies:
        dependency-type: 'development'
        exclude-patterns:
          - 'jest-expo'
          - 'eslint-config-expo'
          - 'react-test-renderer'
          - '@types/react'
    # These packages are governed by Expo SDK's bundledNativeModules.json.
    # Their versions must match what Expo specifies — never let dependabot
    # change them automatically. To update, upgrade the Expo SDK first, then run:
    #   npx expo install --fix && pnpm run install:ios
    ignore:
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-test-renderer'
      - dependency-name: '@types/react'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-reanimated'
      - dependency-name: 'react-native-safe-area-context'
      - dependency-name: 'react-native-screens'
      - dependency-name: 'react-native-worklets'
      - dependency-name: 'react-native-gesture-handler'
      - dependency-name: 'react-native-web'
      - dependency-name: 'nativewind'
    open-pull-requests-limit: 10

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
